<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | Kisaan Krushi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="brand text-center">
            <i class="fa-solid fa-seedling text-success fs-3"></i>
            <div class="text-success fw-bold mt-1">Kisaan Krushi</div>
        </div>
        <a href="admin-dashboard.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="admin-surveys.html" class="nav-link"><i class="fa-solid fa-clipboard-list"></i> All Surveys</a>
        <a href="admin-users.html" class="nav-link active"><i class="fa-solid fa-users-gear"></i> Manage Users</a>
        <div class="mt-auto px-3 pb-3" style="position:absolute; bottom:0; width:100%;">
            <button class="btn btn-outline-danger w-100 rounded-pill" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-navbar d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <button class="btn btn-light d-md-none me-3" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
                <h4 class="mb-0 fw-bold">User Management</h4>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="fa-solid fa-user-plus me-2"></i> Add Surveyor
            </button>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Chat ID</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="6" class="text-center">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Add New Surveyor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="addUserForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="addName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="addEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" id="addPhone" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Telegram Chat ID <span class="text-danger">*</span></label>
                            <input type="text" id="addChatId" class="form-control" required placeholder="E.g. 8457143835">
                            <small class="text-muted">Required for OTP verification</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Temporary Password</label>
                            <input type="password" id="addPassword" class="form-control" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select id="addRole" class="form-select">
                                <option value="user">Surveyor (User)</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="saveUserBtn">Add User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth('admin');
            loadUsers();

            document.getElementById('addUserForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('saveUserBtn');
                btn.disabled = true;
                btn.innerText = 'Adding...';

                const data = {
                    name: document.getElementById('addName').value,
                    email: document.getElementById('addEmail').value,
                    phone: document.getElementById('addPhone').value,
                    telegram_chat_id: document.getElementById('addChatId').value,
                    password: document.getElementById('addPassword').value,
                    role: document.getElementById('addRole').value
                };

                try {
                    await apiFetch('/auth/register', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    
                    showToast('User added successfully!', 'success');
                    document.getElementById('addUserForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                    loadUsers();
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'Add User';
                }
            });
        });

        async function loadUsers() {
            try {
                const users = await apiFetch('/users');
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';

                users.forEach(u => {
                    const statusBadge = u.status === 'active' 
                        ? '<span class="badge bg-success">Active</span>'
                        : '<span class="badge bg-danger">Inactive</span>';
                        
                    const toggleStatusBtn = u.status === 'active'
                        ? `<button class="btn btn-sm btn-outline-warning" onclick="toggleStatus(${u.id}, 'inactive')">Deactivate</button>`
                        : `<button class="btn btn-sm btn-outline-success" onclick="toggleStatus(${u.id}, 'active')">Activate</button>`;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="fw-bold">${u.name}</td>
                        <td>${u.email}</td>
                        <td>${u.phone}</td>
                        <td><code>${u.telegram_chat_id || 'N/A'}</code></td>
                        <td><span class="badge bg-secondary text-uppercase">${u.role}</span></td>
                        <td>${statusBadge}</td>
                        <td>
                            ${toggleStatusBtn}
                            ${u.email !== 'nlr@kisaankrushi.com' ? `<button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteUser(${u.id})"><i class="fa-solid fa-trash"></i></button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                showToast('Failed to load users', 'error');
            }
        }

        async function toggleStatus(id, status) {
            try {
                await apiFetch(`/users/${id}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status })
                });
                showToast(`User marked as ${status}`, 'success');
                loadUsers();
            } catch (error) {
                showToast('Error updating status', 'error');
            }
        }

        async function deleteUser(id) {
            if(!confirm('Delete this user completely, including all their surveys?')) return;
            try {
                await apiFetch(`/users/${id}`, { method: 'DELETE' });
                showToast('User deleted', 'success');
                loadUsers();
            } catch (error) {
                showToast('Error deleting user', 'error');
            }
        }
    </script>
</body>
</html>
