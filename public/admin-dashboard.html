<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Kisaan Krushi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="brand text-center">
            <i class="fa-solid fa-seedling text-success fs-3"></i>
            <div class="text-success fw-bold mt-1">Kisaan Krushi</div>
        </div>
        <a href="admin-dashboard.html" class="nav-link active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="admin-surveys.html" class="nav-link"><i class="fa-solid fa-clipboard-list"></i> All Surveys</a>
        <a href="admin-users.html" class="nav-link"><i class="fa-solid fa-users-gear"></i> Manage Users</a>
        <div class="mt-auto px-3 pb-3" style="position:absolute; bottom:0; width:100%;">
            <button class="btn btn-outline-danger w-100 rounded-pill" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-navbar d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <button class="btn btn-light d-md-none me-3" id="sidebarToggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h4 class="mb-0 fw-bold">Overview</h4>
            </div>
            <div>
                <span class="text-muted me-2" id="adminName">Admin</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=2F855A&color=fff" class="rounded-circle" width="40" alt="Avatar">
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3 col-sm-6">
                <div class="glass-card stat-card d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1 fw-bold">Total Surveys</p>
                        <h3 class="fw-bold mb-0" id="statTotalSurveys">-</h3>
                    </div>
                    <i class="fa-solid fa-file-contract stat-icon"></i>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="glass-card stat-card d-flex justify-content-between align-items-center" style="border-left-color: #3182CE;">
                    <div>
                        <p class="text-muted mb-1 fw-bold">Surveys Today</p>
                        <h3 class="fw-bold mb-0" id="statSurveysToday">-</h3>
                    </div>
                    <i class="fa-solid fa-calendar-day stat-icon" style="color: #3182CE;"></i>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="glass-card stat-card d-flex justify-content-between align-items-center" style="border-left-color: #D69E2E;">
                    <div>
                        <p class="text-muted mb-1 fw-bold">Active Surveyors</p>
                        <h3 class="fw-bold mb-0" id="statActiveSurveyors">-</h3>
                    </div>
                    <i class="fa-solid fa-user-check stat-icon" style="color: #D69E2E;"></i>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="glass-card stat-card d-flex justify-content-between align-items-center" style="border-left-color: #805AD5;">
                    <div>
                        <p class="text-muted mb-1 fw-bold">Total Users</p>
                        <h3 class="fw-bold mb-0" id="statTotalUsers">-</h3>
                    </div>
                    <i class="fa-solid fa-users stat-icon" style="color: #805AD5;"></i>
                </div>
            </div>
        </div>

        <div class="row mb-4 g-4">
            <!-- Charts -->
            <div class="col-md-8">
                <div class="glass-card h-100">
                    <h5 class="fw-bold mb-4">Survey Submissions (Last 7 Days)</h5>
                    <canvas id="dailyChart" height="100"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card h-100">
                    <h5 class="fw-bold mb-4">Top Crops</h5>
                    <canvas id="cropChart" height="200"></canvas>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div class="row">
            <div class="col-12">
                <div class="glass-card">
                    <h5 class="fw-bold mb-3">Survey Map Locations</h5>
                    <div id="surveyMap"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            requireAuth('admin');
            
            const user = getCurrentUser();
            if(user) document.getElementById('adminName').innerText = user.name;

            try {
                // Load Stats
                const stats = await apiFetch('/dashboard/stats');
                document.getElementById('statTotalSurveys').innerText = stats.totalSurveys;
                document.getElementById('statSurveysToday').innerText = stats.surveysToday;
                document.getElementById('statActiveSurveyors').innerText = stats.activeSurveyors;
                document.getElementById('statTotalUsers').innerText = stats.totalUsers;

                // Load Charts Data
                const chartsData = await apiFetch('/dashboard/charts');
                
                // Render Daily Chart
                const dailyCtx = document.getElementById('dailyChart').getContext('2d');
                new Chart(dailyCtx, {
                    type: 'line',
                    data: {
                        labels: chartsData.dailyData.map(d => new Date(d.date).toLocaleDateString()),
                        datasets: [{
                            label: 'Surveys',
                            data: chartsData.dailyData.map(d => d.count),
                            borderColor: '#38A169',
                            backgroundColor: 'rgba(56, 161, 105, 0.2)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });

                // Render Crop Chart
                const cropCtx = document.getElementById('cropChart').getContext('2d');
                new Chart(cropCtx, {
                    type: 'doughnut',
                    data: {
                        labels: chartsData.cropData.map(d => d.crop),
                        datasets: [{
                            data: chartsData.cropData.map(d => d.count),
                            backgroundColor: ['#2F855A', '#F6E05E', '#3182CE', '#DD6B20', '#805AD5']
                        }]
                    },
                    options: { responsive: true }
                });

                // Initialize Map
                const map = L.map('surveyMap').setView([20.5937, 78.9629], 5); // Default to India center
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // Fetch all surveys to plot on map
                const surveys = await apiFetch('/surveys');
                const bounds = [];
                surveys.forEach(s => {
                    if (s.latitude && s.longitude) {
                        const marker = L.marker([s.latitude, s.longitude]).addTo(map);
                        marker.bindPopup(`
                            <b>${s.farmer_name}</b><br>
                            Crop: ${s.crop}<br>
                            Village: ${s.village}<br>
                            Date: ${new Date(s.created_at).toLocaleDateString()}
                        `);
                        bounds.push([s.latitude, s.longitude]);
                    }
                });

                if (bounds.length > 0) {
                    map.fitBounds(bounds);
                }

            } catch (error) {
                console.error("Failed to load dashboard data:", error);
                showToast("Failed to load dashboard data", "error");
            }
        });
    </script>
</body>
</html>
