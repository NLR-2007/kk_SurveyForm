<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisaan Krushi | Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="login-container">
        <div class="glass-card login-card">
            <div class="brand-logo">
                <i class="fa-solid fa-seedling brand-icon"></i>
                <h2>Kisaan Krushi</h2>
                <p class="text-muted">Field Data Collection System</p>
            </div>
            
            <form id="loginForm">
                <div id="step1">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" id="email" class="form-control" placeholder="agent@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                        Sign In <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </div>

                <div id="step2" class="d-none">
                    <div class="mb-4 text-center">
                        <div class="alert alert-info py-2 small">
                            <i class="fa-solid fa-paper-plane me-2"></i>
                            An OTP has been sent to your Telegram.
                        </div>
                        <label class="form-label fw-bold d-block text-start">Enter 6-Digit OTP</label>
                        <div class="d-flex gap-2 justify-content-center mt-3">
                            <input type="text" id="otpCode" class="form-control form-control-lg text-center fw-bold fs-3 tracking-widest" placeholder="000000" maxlength="6" pattern="[0-9]{6}">
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-success w-100 mb-3" id="verifyOtpBtn">
                        Verify & Login <i class="fa-solid fa-check-circle ms-2"></i>
                    </button>
                    <button type="button" class="btn btn-link w-100 text-muted btn-sm" id="backToLogin">
                        Back to Login
                    </button>
                </div>

                <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (user) {
                window.location.href = user.role === 'admin' ? '/admin-dashboard.html' : '/survey-form.html';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const submitBtn = document.getElementById('loginBtn');

            try {
                errorDiv.classList.add('d-none');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Authenticating...';

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                if (data.otpRequired) {
                    // Show OTP step
                    document.getElementById('step1').classList.add('d-none');
                    document.getElementById('step2').classList.remove('d-none');
                    return;
                }

                // If no OTP required (legacy or auto-login), though backend now forces it
                loginSuccess(data);

            } catch (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('d-none');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In <i class="fa-solid fa-arrow-right ms-2"></i>';
            }
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otpCode').value;
            const errorDiv = document.getElementById('loginError');
            const verifyBtn = document.getElementById('verifyOtpBtn');

            if (otp.length !== 6) {
                errorDiv.innerText = "Please enter 6-digit OTP";
                errorDiv.classList.remove('d-none');
                return;
            }

            try {
                errorDiv.classList.add('d-none');
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Verifying...';

                const response = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Verification failed');
                }

                loginSuccess(data);

            } catch (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('d-none');
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'Verify & Login <i class="fa-solid fa-check-circle ms-2"></i>';
            }
        });

        document.getElementById('backToLogin').addEventListener('click', () => {
            document.getElementById('step2').classList.add('d-none');
            document.getElementById('step1').classList.remove('d-none');
            document.getElementById('loginError').classList.add('d-none');
        });

        function loginSuccess(data) {
            // Store user and token
            localStorage.setItem('token', data.accessToken);
            localStorage.setItem('user', JSON.stringify({
                id: data.id, name: data.name, email: data.email, role: data.role
            }));

            // Redirect based on role
            if (data.role === 'admin') {
                window.location.href = '/admin-dashboard.html';
            } else {
                window.location.href = '/survey-form.html';
            }
        }
    </script>
</body>
</html>
